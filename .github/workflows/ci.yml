name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e "libs/loka-schemas[dev]"
          pip install -e "services/adapters[dev]"
          pip install -e "services/ontology[dev]"
          pip install -e "services/state[dev]"
          pip install -e "services/compiler[dev]"
      - name: Lint (ruff)
        run: ruff check libs services
      - name: Type check (mypy --strict)
        run: |
          mypy --strict libs/loka-schemas/loka_schemas
          mypy --strict services/adapters/loka_adapters
          mypy --strict services/ontology/loka_ontology
          mypy --strict services/state/loka_state
          mypy --strict services/compiler/loka_compiler
      - name: Test
        run: pytest libs services -v
