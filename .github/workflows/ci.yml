name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: lint · type-check · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e "libs/loka-schemas[dev]"
          pip install -e "services/adapters[dev,postgres]"
          pip install -e "services/ontology[dev]"
          pip install -e "services/state[dev]"
          pip install -e "services/causal[dev,neo4j]"
          pip install -e "services/knowledge[dev]"
          pip install -e "services/compiler[dev]"
          pip install -e "services/api[dev]"
      - name: Lint (ruff)
        run: ruff check libs services
      - name: Type check (mypy --strict)
        # One invocation over all package source roots so cross-package imports
        # (editable installs) resolve; per-package invocations cannot see siblings.
        run: >
          mypy --strict
          libs/loka-schemas/loka_schemas
          services/adapters/loka_adapters
          services/ontology/loka_ontology
          services/state/loka_state
          services/causal/loka_causal
          services/knowledge/loka_knowledge
          services/compiler/loka_compiler
          services/api/loka_api
          examples/end_to_end_demo.py
      - name: Test
        run: pytest libs services -v
