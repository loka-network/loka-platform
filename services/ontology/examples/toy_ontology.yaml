# Toy ontology — only to verify the engine (machinery) runs.
# This is not real content; a real domain ontology (finance/biology/...) is filled in
# once a vertical domain is chosen.
version: v0.1

entities:
  - type: Instrument
    properties:
      - {name: id, type: string, required: true}
      - {name: notional, type: double}
  - type: Bond
    subtype_of: Instrument
    properties:
      - {name: coupon, type: double}
      - {name: maturity, type: date}
  - type: SovereignBond
    subtype_of: Bond
    properties:
      - {name: issuer_country, type: string, required: true}
  - {type: PolicyLever}
  - {type: Regulator}
  - type: CentralBank
    subtype_of: Regulator
    properties:
      - {name: policy_rate, type: double}
      - {name: last_updated, type: timestamp}

verbs:
  - {name: REGULATE, class: institutional}
  - {name: TRADE, class: factual}
  - {name: ANNOUNCE, class: communicative}

relations:
  - {name: regulator-of, from: Regulator, to: Instrument}

constraints:
  # Only a Regulator may REGULATE, and the target must be an Instrument or a PolicyLever.
  - {verb: REGULATE, agent_must_be: Regulator, target_must_be: [Instrument, PolicyLever]}
